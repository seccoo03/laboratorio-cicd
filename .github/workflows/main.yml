name: CI/CD Pipeline per Sito Statico

on:
  push:
    branches: [ main, master ]

jobs:

  # ----------------------------------------
  # JOB A: QUALITY CHECK (CI)
  # ----------------------------------------
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice nella pipeline
        uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Controlla la sintassi HTML (Linting)
        run: |
          npm install -g htmlhint
          htmlhint index.html --disable doctype-first,spec-char-escape

      - name: Controlla i link rotti
        uses: lycheeverse/lychee-action@v2
        with:
          args: './index.html'
          fail: true # Fa fallire il job se trova un link rotto

  # ----------------------------------------
  # JOB B: CONTAINER REGISTRY (DOCKER)
  # ----------------------------------------
  docker-registry:
    runs-on: ubuntu-latest
    needs: quality-check
    permissions:
      contents: read
      packages: write
    steps:
      - name: Scarica il codice nella pipeline
        uses: actions/checkout@v4

      - name: Accedi al GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Costruisci e invia l'immagine Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/test-sito:latest

  # ----------------------------------------
  # JOB C: DEPLOYMENT (CD ON GITHUB PAGES)
  # ----------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: docker-registry
    permissions:
      contents: write
    steps:
      - name: Scarica il codice nella pipeline
        uses: actions/checkout@v4

      - name: Rilascio su GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./